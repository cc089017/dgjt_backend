<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입 - 당근장터</title>
  <link rel="icon" type="image/png" href="/assets/image.png" />
  <link rel="stylesheet" href="/css/tailwind.css" />
  <script src="https://cdn.jsdelivr.net/npm/axios@1/dist/axios.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-gray-50 flex flex-col">
  <div id="header"></div>
  <main class="flex-grow">
    <div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
      <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-3xl shadow-xl shadow-gray-100 border border-gray-100">
        <div class="text-center">
          <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">회원가입</h2>
          <p class="mt-2 text-sm text-gray-500">당근장터에 오신 것을 환영합니다!</p>
        </div>

        <div id="signup-error" class="hidden bg-red-50 text-red-500 p-4 rounded-xl text-sm font-medium"></div>

        <form id="signup-form" class="mt-8 space-y-6">
          <div class="space-y-4">
            <div class="relative">
              <i data-lucide="user-plus" width="18" height="18" class="absolute left-3 top-3.5 text-gray-400"></i>
              <input
                type="text"
                name="user_id"
                required
                placeholder="아이디"
                class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-transparent rounded-xl focus:bg-white focus:border-primary focus:outline-none transition-all"
              />
            </div>
            <div class="relative">
              <i data-lucide="lock" width="18" height="18" class="absolute left-3 top-3.5 text-gray-400"></i>
              <input
                type="password"
                name="user_pwd"
                required
                placeholder="비밀번호"
                class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-transparent rounded-xl focus:bg-white focus:border-primary focus:outline-none transition-all"
              />
            </div>
            <div class="relative">
              <i data-lucide="user" width="18" height="18" class="absolute left-3 top-3.5 text-gray-400"></i>
              <input
                type="text"
                name="nickname"
                required
                placeholder="닉네임"
                class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-transparent rounded-xl focus:bg-white focus:border-primary focus:outline-none transition-all"
              />
            </div>
            <div class="relative">
              <i data-lucide="mail" width="18" height="18" class="absolute left-3 top-3.5 text-gray-400"></i>
              <input
                type="email"
                name="email"
                placeholder="이메일 주소"
                class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-transparent rounded-xl focus:bg-white focus:border-primary focus:outline-none transition-all"
              />
            </div>
            <div class="relative">
              <i data-lucide="phone" width="18" height="18" class="absolute left-3 top-3.5 text-gray-400"></i>
              <input
                type="tel"
                name="phone_num"
                required
                placeholder="휴대폰 번호 (- 제외)"
                class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-transparent rounded-xl focus:bg-white focus:border-primary focus:outline-none transition-all"
              />
            </div>
            <div class="relative">
              <i data-lucide="map-pin" width="18" height="18" class="absolute left-3 top-3.5 text-gray-400"></i>
              <input
                type="text"
                name="region"
                required
                placeholder="활동 지역 (예: 서울 강남구)"
                class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-transparent rounded-xl focus:bg-white focus:border-primary focus:outline-none transition-all"
              />
            </div>
          </div>

          <div class="space-y-3">
            <div class="flex items-start">
              <input id="terms" type="checkbox" required class="mt-1 h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded" />
              <label for="terms" class="ml-2 block text-sm text-gray-500">
                <span class="font-medium text-gray-900">이용약관 및 개인정보 처리방침</span>에 동의합니다.
              </label>
            </div>
          </div>

          <button
            id="signup-submit"
            type="submit"
            class="w-full py-4 bg-primary text-white font-bold rounded-xl shadow-lg shadow-primary/20 hover:brightness-110 transition-all disabled:bg-gray-400"
          >
            가입하기
          </button>
        </form>

        <p class="text-center text-sm text-gray-500">
          이미 계정이 있으신가요?
          <a href="/login.html" class="font-bold text-primary hover:underline">로그인</a>
        </p>
      </div>
    </div>
  </main>

  <div id="footer"></div>

  <script type="module" src="/js/pages/signup.js"></script>
</body>
</html>
