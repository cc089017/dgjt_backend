<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>검색 결과 - 당근장터</title>
  <link rel="icon" type="image/png" href="/assets/image.png" />
  <link rel="stylesheet" href="/css/tailwind.css" />
  <script src="https://cdn.jsdelivr.net/npm/axios@1/dist/axios.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-gray-50 flex flex-col">
  <div id="header"></div>
  <main class="flex-grow">
    <div class="max-w-7xl mx-auto px-4 py-8 space-y-8">
      <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 border-b border-gray-100 pb-8">
        <div class="space-y-2">
          <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">
            '<span id="search-query" class="text-primary"></span>' 검색 결과
          </h1>
          <p class="text-gray-500 font-medium">총 <span id="search-count">0</span>개의 상품을 찾았습니다.</p>
        </div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
        <div class="lg:col-span-4">
          <div id="search-results">
            <div class="text-center py-20 font-bold text-gray-400">검색 중...</div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <div id="footer"></div>
  <script type="module" src="/js/pages/search.js"></script>
</body>
</html>
