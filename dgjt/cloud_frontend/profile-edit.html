<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>프로필 수정 - 당근장터</title>
  <link rel="icon" type="image/png" href="/assets/image.png" />
  <link rel="stylesheet" href="/css/tailwind.css" />
  <script src="https://cdn.jsdelivr.net/npm/axios@1/dist/axios.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-gray-50 flex flex-col">
  <div id="header"></div>
  <main class="flex-grow">
    <div class="max-w-2xl mx-auto px-4 py-12">
      <div class="space-y-8">
        <div class="flex items-center gap-4 border-b border-gray-100 pb-6">
          <button id="profile-back" type="button" class="p-2 hover:bg-gray-100 rounded-full transition-colors">
            <i data-lucide="chevron-left" width="24" height="24"></i>
          </button>
          <h1 class="text-2xl font-extrabold text-gray-900 tracking-tight">프로필 수정</h1>
        </div>

        <div class="flex flex-col items-center gap-4 py-4">
          <div class="relative">
            <img id="profile-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=" alt="Profile" class="w-32 h-32 rounded-[2.5rem] shadow-xl border-4 border-white" />
            <button type="button" class="absolute -bottom-2 -right-2 p-3 bg-primary text-white shadow-lg rounded-2xl hover:brightness-110 transition-all border-4 border-white">
              <i data-lucide="camera" width="20" height="20"></i>
            </button>
          </div>
          <p class="text-sm font-bold text-primary cursor-pointer hover:underline">프로필 사진 변경</p>
        </div>

        <form id="profile-form" class="space-y-6">
          <div class="space-y-2">
            <label class="text-sm font-bold text-gray-500 ml-1">상점 이름(닉네임)</label>
            <div class="flex gap-2">
              <div class="relative flex-1">
                <i data-lucide="user" width="18" height="18" class="absolute left-4 top-4 text-gray-400"></i>
                <input type="text" name="nickname" id="nickname-input" required
                  class="w-full pl-12 pr-5 py-4 bg-gray-50 border-transparent rounded-2xl focus:bg-white focus:border-primary focus:outline-none transition-all font-bold" />
              </div>
              <button type="button" id="nickname-check-btn"
                class="flex-shrink-0 px-5 py-4 bg-gray-100 text-gray-700 text-sm font-bold rounded-2xl hover:bg-gray-200 transition-all whitespace-nowrap">
                중복확인
              </button>
            </div>
            <p id="nickname-check-msg" class="hidden text-xs font-semibold ml-1"></p>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-2">
              <label class="text-sm font-bold text-gray-500 ml-1">휴대폰 번호</label>
              <div class="relative">
                <i data-lucide="phone" width="18" height="18" class="absolute left-4 top-4 text-gray-400"></i>
                <input type="tel" name="phone_num" class="w-full pl-12 pr-5 py-4 bg-gray-50 border-transparent rounded-2xl focus:bg-white focus:border-primary focus:outline-none transition-all font-medium" />
              </div>
            </div>
            <div class="space-y-2">
              <label class="text-sm font-bold text-gray-500 ml-1">활동 지역</label>
              <div class="relative">
                <i data-lucide="map-pin" width="18" height="18" class="absolute left-4 top-4 text-gray-400"></i>
                <input type="text" name="region" class="w-full pl-12 pr-5 py-4 bg-gray-50 border-transparent rounded-2xl focus:bg-white focus:border-primary focus:outline-none transition-all font-medium" />
              </div>
            </div>
          </div>

          <div class="pt-4">
            <div class="flex items-center gap-3 p-5 bg-gray-50 rounded-2xl border border-gray-100">
              <i data-lucide="shield-check" width="24" height="24" class="text-green-500"></i>
              <div>
                <h4 class="text-sm font-bold text-gray-900">본인 인증 완료</h4>
                <p class="text-xs text-gray-500">인증된 정보는 수정이 불가능합니다.</p>
              </div>
            </div>
          </div>

          <div class="pt-8 flex gap-4">
            <button type="button" id="profile-cancel" class="flex-1 py-4 bg-white border-2 border-gray-100 text-gray-600 font-bold rounded-2xl hover:bg-gray-50 transition-all">취소</button>
            <button type="submit" id="profile-save" class="flex-[2] py-4 bg-primary text-white font-bold rounded-2xl shadow-xl shadow-primary/20 hover:brightness-110 transition-all disabled:bg-gray-400">저장하기</button>
          </div>
        </form>
      </div>
    </div>
  </main>
  <div id="footer"></div>
  <script type="module" src="/js/pages/profile-edit.js"></script>
  <!-- 비밀번호 변경 섹션은 profile-edit.js 내 mountPasswordSection()으로 렌더링 -->
  <template id="pw-section-tpl">
    <div class="max-w-2xl mx-auto px-4 pb-16">
      <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-8 space-y-6">
        <div class="flex items-center gap-3 border-b border-gray-100 pb-5">
          <div class="p-2 bg-sky-50 rounded-xl">
            <i data-lucide="lock" width="20" height="20" class="text-primary"></i>
          </div>
          <h2 class="text-lg font-extrabold text-gray-900">비밀번호 변경</h2>
        </div>

        <div id="pw-error" class="hidden bg-red-50 text-red-500 p-4 rounded-xl text-sm font-medium"></div>
        <div id="pw-success" class="hidden bg-sky-50 text-primary p-4 rounded-xl text-sm font-medium"></div>

        <form id="password-form" class="space-y-4">
          <div class="space-y-2">
            <label class="text-sm font-bold text-gray-500 ml-1">현재 비밀번호</label>
            <div class="relative">
              <i data-lucide="lock" width="18" height="18" class="absolute left-4 top-4 text-gray-400"></i>
              <input id="pw-current" type="password" name="current_pwd" required
                placeholder="현재 비밀번호를 입력해주세요"
                class="w-full pl-12 pr-5 py-4 bg-gray-50 border-transparent rounded-2xl focus:bg-white focus:border-primary focus:outline-none transition-all" />
            </div>
          </div>

          <div class="space-y-2">
            <label class="text-sm font-bold text-gray-500 ml-1">새 비밀번호</label>
            <div class="relative">
              <i data-lucide="lock-keyhole" width="18" height="18" class="absolute left-4 top-4 text-gray-400"></i>
              <input id="pw-new" type="password" name="new_pwd" required
                placeholder="새 비밀번호 (8자 이상)"
                class="w-full pl-12 pr-5 py-4 bg-gray-50 border-transparent rounded-2xl focus:bg-white focus:border-primary focus:outline-none transition-all" />
            </div>
          </div>

          <div class="space-y-2">
            <label class="text-sm font-bold text-gray-500 ml-1">새 비밀번호 확인</label>
            <div class="relative">
              <i data-lucide="lock-keyhole" width="18" height="18" class="absolute left-4 top-4 text-gray-400"></i>
              <input id="pw-confirm" type="password" name="new_pwd_confirm" required
                placeholder="새 비밀번호를 한 번 더 입력해주세요"
                class="w-full pl-12 pr-5 py-4 bg-gray-50 border-transparent rounded-2xl focus:bg-white focus:border-primary focus:outline-none transition-all" />
            </div>
          </div>

          <div class="pt-2">
            <button type="submit" id="pw-submit"
              class="w-full py-4 bg-primary text-white font-bold rounded-2xl shadow-xl shadow-primary/20 hover:brightness-110 transition-all disabled:bg-gray-400">
              비밀번호 변경
            </button>
          </div>
        </form>
      </div>
    </div>
  </template>
</body>
</html>
